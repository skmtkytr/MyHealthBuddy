name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Decode keystore (if provided)
        if: env.KEYSTORE_B64 != ''
        run: |
          mkdir -p $HOME/.signing
          echo "$KEYSTORE_B64" | base64 -d > $HOME/.signing/release.jks
          echo "RELEASE_STORE_FILE=$HOME/.signing/release.jks" >> $GITHUB_ENV

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APKs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
